<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Diplomado · Competencias para la Empleabilidad · SECNA</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0B0E1A;--deep:#111627;--navy:#182040;
  --gold:#C9A84C;--gold2:#F0CC7A;--gold-lt:rgba(201,168,76,.12);
  --blue:#2563EB;--blue-lt:rgba(37,99,235,.1);
  --teal:#0D9488;--teal-lt:rgba(13,148,136,.1);
  --rose:#E11D48;--rose-lt:rgba(225,29,72,.1);
  --amber:#D97706;--amber-lt:rgba(217,119,6,.1);
  --violet:#7C3AED;--violet-lt:rgba(124,58,237,.1);
  --white:#FFFFFF;--off:#F8F6F1;--glt:#E5E2D9;--gmd:#C4C0B4;
  --gray:#8A8680;--text:#1A1714;--text2:#4A4641;
  --fs:'DM Sans',sans-serif;--fd:'Fraunces',Georgia,serif;--fm:'JetBrains Mono',monospace;
  --r:12px;--r2:20px;
  --sh:0 4px 20px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04);
  --sh2:0 12px 40px rgba(0,0,0,.1),0 2px 8px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fs)}
body{background:var(--off);color:var(--text);overflow:hidden;display:flex;flex-direction:column}

/* ── TOP BAR ── */
#top{background:var(--ink);height:54px;display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;position:relative;z-index:100}
#top::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--gold),transparent 60%)}
.t-seal{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-weight:500;font-size:10px;color:var(--ink);flex-shrink:0;letter-spacing:.05em}
.t-brand{font-family:var(--fd);font-size:15px;color:var(--white);letter-spacing:-.01em}
.t-brand em{color:var(--gold2);font-style:normal}
.t-pipe{width:1px;height:18px;background:rgba(255,255,255,.12)}
.t-course{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.03em;font-weight:300}
.t-sp{flex:1}
.t-prog{display:flex;align-items:center;gap:10px}
.t-bar{width:110px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.t-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1);width:0%}
.t-pct{font-family:var(--fm);font-size:11px;color:var(--gold2);min-width:30px;font-weight:500}
.t-badge{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);color:var(--gold2);font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:3px 10px;border-radius:4px}
.ham{background:none;border:none;color:rgba(255,255,255,.4);font-size:18px;cursor:pointer;padding:4px;display:flex;align-items:center;transition:color .15s}
.ham:hover{color:var(--white)}

/* ── LAYOUT ── */
#lay{flex:1;display:flex;overflow:hidden}

/* ── SIDEBAR ── */
#sb{width:280px;min-width:280px;background:var(--ink);display:flex;flex-direction:column;overflow:hidden;transition:width .3s,min-width .3s;border-right:1px solid rgba(255,255,255,.05)}
#sb.shut{width:0;min-width:0}
.sb-hd{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.sb-dip{font-size:8px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.sb-name{font-family:var(--fd);font-size:14px;color:var(--white);line-height:1.4;margin-bottom:14px;font-weight:300;font-style:italic}
.sb-stats{display:flex;gap:8px}
.sb-stat{flex:1;text-align:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:8px 4px}
.sb-n{font-family:var(--fd);font-size:20px;color:var(--gold2);line-height:1}
.sb-l{font-size:8px;color:rgba(255,255,255,.35);margin-top:3px;letter-spacing:.04em;font-weight:300}
.sb-scroll{flex:1;overflow-y:auto;padding:10px 0 24px}
.sb-scroll::-webkit-scrollbar{width:2px}
.sb-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08)}
.sb-sec{padding:12px 16px 5px;font-size:8px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.2)}
.sb-it{display:flex;align-items:flex-start;gap:10px;padding:9px 16px;cursor:pointer;transition:background .12s;border-left:3px solid transparent}
.sb-it:hover{background:rgba(255,255,255,.03)}
.sb-it.act{background:rgba(201,168,76,.1);border-left-color:var(--gold)}
.sb-it.done{border-left-color:var(--teal)}
.sb-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--fm);font-size:10px;font-weight:500;margin-top:1px;border:1.5px solid rgba(255,255,255,.12);color:rgba(255,255,255,.35);background:transparent;transition:all .2s}
.sb-it.act .sb-num{background:var(--gold);border-color:var(--gold);color:var(--ink)}
.sb-it.done .sb-num{background:rgba(13,148,136,.2);border-color:var(--teal);color:var(--teal)}
.sb-it.integrador .sb-num{border-color:rgba(201,168,76,.4);color:var(--gold2)}
.sb-it.act.integrador .sb-num{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink)}
.sb-nm{font-size:12px;font-weight:500;color:rgba(255,255,255,.5);line-height:1.35;margin-bottom:2px}
.sb-it.act .sb-nm{color:var(--white);font-weight:600}
.sb-meta{font-size:10px;color:rgba(255,255,255,.25);font-weight:300}
.sb-ft{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06);font-size:10px;color:rgba(255,255,255,.3);font-weight:300}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#lhdr{background:var(--white);border-bottom:1px solid var(--glt);padding:0 32px;flex-shrink:0;box-shadow:var(--sh)}
.lhdr-top{display:flex;align-items:center;gap:10px;padding:14px 0 0}
.bc{font-size:11px;color:var(--gray);display:flex;align-items:center;gap:5px}
.bc span{color:var(--blue);cursor:pointer;font-weight:500}
.lhdr-tabs{display:flex;gap:2px}
.ltab{padding:10px 18px 9px;font-size:13px;font-weight:500;color:var(--gray);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;margin-bottom:-1px;transition:all .15s;font-family:var(--fs);white-space:nowrap}
.ltab:hover{color:var(--blue)}
.ltab.act{color:var(--blue);border-bottom-color:var(--blue)}
#cont{flex:1;overflow-y:auto;padding:32px 40px 100px}
#cont::-webkit-scrollbar{width:4px}
#cont::-webkit-scrollbar-thumb{background:var(--glt);border-radius:2px}
.cw{max-width:860px;margin:0 auto}

/* ── HERO ── */
.hero{border-radius:var(--r2);padding:32px 36px;margin-bottom:28px;position:relative;overflow:hidden;background:var(--ink)}
.hero-pattern{position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,rgba(201,168,76,.03) 0,rgba(201,168,76,.03) 1px,transparent 1px,transparent 10px);pointer-events:none}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:260px;height:260px;background:radial-gradient(circle,rgba(201,168,76,.18) 0%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-20px;left:20%;width:300px;height:140px;background:radial-gradient(ellipse,rgba(37,99,235,.1) 0%,transparent 70%);pointer-events:none}
.hero-tag{font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold2);margin-bottom:10px;display:flex;align-items:center;gap:8px;position:relative}
.hero-tag::before{content:'';width:20px;height:1px;background:var(--gold);display:inline-block}
.hero-ttl{font-family:var(--fd);font-size:28px;color:var(--white);line-height:1.15;margin-bottom:10px;position:relative;font-weight:600}
.hero-ttl em{color:var(--gold2);font-style:italic;font-weight:300}
.hero-desc{font-size:14px;color:rgba(255,255,255,.55);line-height:1.8;max-width:600px;margin-bottom:18px;position:relative;font-weight:300}
.hero-chips{display:flex;gap:7px;flex-wrap:wrap;position:relative}
.hchip{font-size:11px;font-weight:400;padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.5)}
.hchip.g{background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.3);color:var(--gold2)}
.hchip.b{background:rgba(37,99,235,.12);border-color:rgba(37,99,235,.3);color:#93C5FD}

/* ── PROSE ── */
.prose h2{font-family:var(--fd);font-size:22px;color:var(--ink);margin:30px 0 12px;line-height:1.25;font-weight:600}
.prose h2:first-child{margin-top:0}
.prose h3{font-size:11px;font-weight:600;color:var(--blue);margin:20px 0 8px;text-transform:uppercase;letter-spacing:.09em;display:flex;align-items:center;gap:9px}
.prose h3::after{content:'';flex:1;height:1px;background:var(--blue-lt)}
.prose p{font-size:14.5px;color:var(--text2);line-height:1.85;margin-bottom:12px;font-weight:300}
.prose p strong{color:var(--text);font-weight:600}
.prose ul,.prose ol{margin:8px 0 14px 22px}
.prose li{font-size:14px;color:var(--text2);line-height:1.78;margin-bottom:7px;font-weight:300}
.prose li strong{color:var(--text);font-weight:600}

/* ── CALLOUTS ── */
.co{border-radius:var(--r);padding:14px 18px;margin:14px 0;display:flex;gap:13px;align-items:flex-start;border-left:3px solid}
.co.b{background:var(--blue-lt);border-color:var(--blue)}
.co.t{background:var(--teal-lt);border-color:var(--teal)}
.co.a{background:var(--amber-lt);border-color:var(--amber)}
.co.g{background:var(--gold-lt);border-color:var(--gold)}
.co.r{background:var(--rose-lt);border-color:var(--rose)}
.co.dk{background:var(--deep);border-color:var(--gold)}
.co-ico{font-size:17px;flex-shrink:0;margin-top:2px}
.co-bd{font-size:13.5px;color:var(--text2);line-height:1.75;font-weight:300}
.co.dk .co-bd{color:rgba(255,255,255,.65)}
.co-bd strong{color:var(--text);font-weight:600;display:block;margin-bottom:4px;font-size:13px}
.co.dk .co-bd strong{color:var(--white)}
.co-bd ul{margin:5px 0 0 15px}
.co-bd li{font-size:13px;margin-bottom:5px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;margin:14px 0}
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{background:var(--ink);color:var(--gold2);font-weight:500;padding:10px 14px;text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--glt);color:var(--text2);font-weight:300;vertical-align:top}
.tbl tr:hover td{background:rgba(37,99,235,.03)}

/* ── CARDS GRID ── */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin:14px 0}
.card{background:var(--white);border:1px solid var(--glt);border-radius:var(--r);padding:16px 18px;transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.card-ico{font-size:22px;margin-bottom:10px}
.card-ttl{font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px}
.card-tx{font-size:12.5px;color:var(--gray);line-height:1.65;font-weight:300}

/* ── PHASES ── */
.phases{display:flex;flex-direction:column;gap:10px;margin:14px 0}
.phase{display:flex;gap:14px;background:var(--white);border:1px solid var(--glt);border-radius:var(--r);padding:14px 18px;align-items:flex-start}
.phase-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:11px;font-weight:500;flex-shrink:0;color:var(--white)}
.phase-bd{flex:1}
.phase-ttl{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.phase-tx{font-size:13px;color:var(--gray);line-height:1.65;font-weight:300}
.phase-dur{font-family:var(--fm);font-size:10px;color:var(--gray);margin-top:4px;font-weight:400}

/* ── EVIDENCE LIST ── */
.ev-list{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.ev-it{display:flex;gap:12px;background:var(--white);border:1px solid var(--glt);border-radius:var(--r);padding:12px 16px;align-items:flex-start}
.ev-n{width:26px;height:26px;border-radius:50%;background:var(--ink);color:var(--gold2);font-family:var(--fm);font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ev-bd{flex:1}
.ev-ttl{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.ev-tx{font-size:12.5px;color:var(--gray);line-height:1.6;font-weight:300}

/* ── RUBRIC ── */
.rubric{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}
.rub-it{border-radius:var(--r);padding:14px 16px;border:1px solid}
.rub-it.hi{background:rgba(13,148,136,.06);border-color:rgba(13,148,136,.2)}
.rub-it.md{background:rgba(217,119,6,.06);border-color:rgba(217,119,6,.2)}
.rub-it.lo{background:rgba(225,29,72,.06);border-color:rgba(225,29,72,.2)}
.rub-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.rub-it.hi .rub-lbl{color:var(--teal)}
.rub-it.md .rub-lbl{color:var(--amber)}
.rub-it.lo .rub-lbl{color:var(--rose)}
.rub-tx{font-size:12.5px;color:var(--text2);line-height:1.65;font-weight:300}

/* ── QUIZ ── */
.quiz{background:var(--white);border:1px solid var(--glt);border-radius:var(--r2);overflow:hidden}
.quiz-hd{background:var(--ink);padding:16px 22px;display:flex;align-items:center;gap:14px}
.quiz-hd-ico{font-size:22px}
.quiz-hd-ttl{font-family:var(--fd);font-size:15px;color:var(--white);font-weight:600}
.quiz-hd-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;font-weight:300}
.quiz-prog{height:3px;background:rgba(255,255,255,.08)}
.quiz-pf{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .4s}
.quiz-body{padding:24px 22px}
.q-cnt{font-family:var(--fm);font-size:10px;color:var(--gray);margin-bottom:8px;font-weight:400}
.q-text{font-size:15px;font-weight:500;color:var(--text);line-height:1.65;margin-bottom:18px}
.q-opts{display:flex;flex-direction:column;gap:8px}
.q-opt{display:flex;align-items:flex-start;gap:11px;padding:11px 14px;border-radius:var(--r);border:1.5px solid var(--glt);cursor:pointer;text-align:left;background:var(--white);transition:all .15s;font-family:var(--fs)}
.q-opt:hover{border-color:var(--blue);background:var(--blue-lt)}
.q-opt.sel{border-color:var(--blue);background:var(--blue-lt)}
.q-opt.ok{border-color:var(--teal);background:var(--teal-lt);pointer-events:none}
.q-opt.bad{border-color:var(--rose);background:var(--rose-lt);pointer-events:none}
.q-let{width:24px;height:24px;border-radius:6px;border:1.5px solid var(--gmd);display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:11px;font-weight:500;color:var(--gray);flex-shrink:0;transition:all .15s}
.q-opt.sel .q-let{background:var(--blue);border-color:var(--blue);color:var(--white)}
.q-opt.ok .q-let{background:var(--teal);border-color:var(--teal);color:var(--white)}
.q-opt.bad .q-let{background:var(--rose);border-color:var(--rose);color:var(--white)}
.q-opt-tx{font-size:14px;color:var(--text2);line-height:1.55;font-weight:300}
.q-fb{margin-top:14px;padding:12px 16px;border-radius:var(--r);font-size:13.5px;line-height:1.65;display:none;font-weight:300}
.q-fb.show{display:block}
.q-fb.ok-fb{background:var(--teal-lt);color:var(--teal);border:1px solid rgba(13,148,136,.2)}
.q-fb.bad-fb{background:var(--rose-lt);color:var(--rose);border:1px solid rgba(225,29,72,.2)}
.quiz-ft{padding:14px 22px;border-top:1px solid var(--glt);display:flex;justify-content:space-between;align-items:center}
.q-sc{font-family:var(--fm);font-size:12px;color:var(--gray);font-weight:400}

/* ── CHECKLIST ── */
.cl{background:var(--white);border:1px solid var(--glt);border-radius:var(--r2);overflow:hidden;margin:14px 0}
.cl-hd{background:var(--ink);padding:14px 20px;font-family:var(--fd);font-size:15px;color:var(--white);font-weight:600}
.cl-it{display:flex;align-items:flex-start;gap:12px;padding:12px 20px;border-bottom:1px solid var(--glt);cursor:pointer;transition:background .12s}
.cl-it:last-child{border-bottom:none}
.cl-it:hover{background:var(--off)}
.cl-it.chk{background:rgba(13,148,136,.04)}
.cl-bx{width:20px;height:20px;border:1.5px solid var(--gmd);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;margin-top:2px}
.cl-it.chk .cl-bx{background:var(--teal);border-color:var(--teal);color:var(--white)}
.cl-tx{font-size:14px;color:var(--text2);line-height:1.65;font-weight:300}
.cl-it.chk .cl-tx{text-decoration:line-through;color:var(--gray)}

/* ── BTNS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1.5px solid;font-family:var(--fs)}
.btn-gold{background:var(--gold);border-color:var(--gold);color:var(--ink)}
.btn-gold:hover{background:var(--gold2);border-color:var(--gold2)}
.btn-out{background:transparent;border-color:var(--gmd);color:var(--text2)}
.btn-out:hover{border-color:var(--text2)}
.btn-b{background:var(--blue);border-color:var(--blue);color:var(--white)}
.btn-b:hover{opacity:.9}
.btn[disabled]{opacity:.4;cursor:not-allowed}

/* ── CASO ── */
.case-wrap{background:var(--white);border:1px solid var(--glt);border-radius:var(--r2);overflow:hidden;margin:14px 0}
.case-hd{background:var(--ink);padding:18px 22px;display:flex;justify-content:space-between;align-items:flex-start}
.case-ttl{font-family:var(--fd);font-size:16px;color:var(--white);font-weight:600;margin-bottom:4px}
.case-sub{font-size:12px;color:rgba(255,255,255,.4);font-weight:300}
.case-dur{font-family:var(--fm);font-size:10px;color:var(--gold2);margin-top:6px;font-weight:400}
.case-body{padding:22px}
.case-desc{font-size:14px;color:var(--text2);line-height:1.8;margin-bottom:18px;font-weight:300}
.ws-area{margin-top:16px}
.ws-lbl{font-size:11px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.ws-ta{width:100%;border:1.5px solid var(--glt);border-radius:var(--r);padding:12px 14px;font-size:14px;font-family:var(--fs);color:var(--text);resize:vertical;min-height:90px;transition:border-color .15s;font-weight:300}
.ws-ta:focus{outline:none;border-color:var(--blue)}

/* ── SKILLS GRID ── */
.skills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:12px 0}
.skill-it{background:var(--white);border:1px solid var(--glt);border-radius:var(--r);padding:14px 16px}
.skill-num{font-family:var(--fd);font-size:24px;color:var(--gold);line-height:1;margin-bottom:4px}
.skill-tx{font-size:12.5px;color:var(--text2);line-height:1.6;font-weight:300}

/* ── INTEGRADOR badge ── */
.int-badge{display:inline-flex;align-items:center;gap:6px;background:var(--gold-lt);border:1px solid rgba(201,168,76,.3);color:var(--gold);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:12px}

/* ── CONTENIDO RICO ── */
.tema-bloque{background:var(--white);border:1px solid var(--glt);border-radius:var(--r2);overflow:hidden;margin:18px 0}

.analogy-ic{font-size:18px;flex-shrink:0;margin-top:2px}
.analogy-tx{font-size:13.5px;color:rgba(255,255,255,.7);line-height:1.65;font-weight:300}
.analogy-tx strong{color:var(--white);font-weight:500}
.cmp-tbl{width:100%;border-collapse:collapse;font-size:13.5px;margin:10px 0}

.cmp-tbl td{padding:9px 14px;border-bottom:1px solid var(--glt);color:var(--text2);font-weight:300;vertical-align:top}

.cmp-tbl tr:hover td{background:rgba(37,99,235,.03)}

.insight-ic{font-size:18px;flex-shrink:0}

.ejercicio-tx{font-size:13.5px;color:var(--text2);line-height:1.75;font-weight:300;font-style:italic}
.cierre-box{background:var(--ink);border-radius:var(--r);padding:14px 20px;margin-top:16px;text-align:center}
.cierre-tx{font-family:var(--fd);font-size:15px;color:var(--white);line-height:1.5;font-weight:300;font-style:italic}

.fade-up{animation:fadeUp .35s ease both}

/* ── STATE ── */
let cur = 0;
let curTab = 0;
let done = new Set();
const QS = BLOQUES.map(()=>({q:0,score:0}));

/* ── SIDEBAR ── */
function buildSb(){
  const list = document.getElementById('sblist');
  list.innerHTML = '';

  const sec1 = document.createElement('div');
  sec1.className = 'sb-sec'; sec1.textContent = 'Módulos formativos';
  list.appendChild(sec1);

  BLOQUES.forEach((b,i)=>{
    if(b.esIntegrador) return;
    const el = document.createElement('div');
    el.className = 'sb-it' + (i===cur?' act':'') + (done.has(i)?' done':'');
    el.innerHTML = `<div class="sb-num">${i+1}</div><div><div class="sb-nm">${b.title}</div><div class="sb-meta">${b.dur} · 3 unidades</div></div>`;
    el.onclick = ()=>{cur=i;curTab=0;buildSb();render();};
    list.appendChild(el);
  });

  const sec2 = document.createElement('div');
  sec2.className = 'sb-sec'; sec2.textContent = 'Evaluación final';
  list.appendChild(sec2);

  const bi = BLOQUES[5];
  const el = document.createElement('div');
  el.className = 'sb-it integrador' + (cur===5?' act':'') + (done.has(5)?' done':'');
  el.innerHTML = `<div class="sb-num">★</div><div><div class="sb-nm">${bi.title}</div><div class="sb-meta">${bi.dur} · Certificación</div></div>`;
  el.onclick = ()=>{cur=5;curTab=0;buildSb();render();};
  list.appendChild(el);

  // progress
  const pct = Math.round(done.size/6*100);
  document.getElementById('tfill').style.width = pct+'%';
  document.getElementById('tpct').textContent = pct+'%';
}

/* ── TABS ── */
function setTab(n, btn){
  curTab=n;
  document.querySelectorAll('.ltab').forEach((t,i)=>t.classList.toggle('act',i===n));
  render();
}

/* ── MAIN RENDER ── */
function render(){
  const b = BLOQUES[cur];
  document.getElementById('bc-mod').textContent = `Módulo ${b.esIntegrador?'Integrador':cur+1}`;
  const cw = document.getElementById('cw');
  cw.innerHTML='';
  cw.className='cw fade-up';

  if(curTab===0) renderTeoria(cw,b);
  else if(curTab===1) renderCaso(cw,b);
  else if(curTab===2) renderQuiz(cw,b);
  else renderChecklist(cw,b);
}

                <strong>Antes →</strong> ${t.cambio.antes}<br><br>
                <strong>Ahora →</strong> ${t.cambio.ahora}

            </div>
          </div>
          <div class="tema-sec">
            <div class="tema-sec-ttl">Error común</div>
            <div class="co r" style="margin:0"><span class="co-ico">⚠️</span><div class="co-bd">${t.error}</div></div>
          </div>
          <div class="insight-box">
            <div class="insight-ic">💡</div>
            <div class="insight-tx">${t.insight}</div>
          </div>

            <div class="tema-sec-ttl">Mini ejercicio de conciencia</div>
            <div class="ejercicio-box">
              <div class="ejercicio-ttl">Reflexiona</div>

            </div>
          </div>

          </div>

        </div>

    `).join('') : b.unidades.map(u=>`
      <h3>${u.titulo}</h3>
      <ul>${u.items.map(i=>`<li>${i}</li>`).join('')}</ul>
    `).join('')}

    <h2>Secuencia de aprendizaje</h2>
    <div class="phases">
      ${b.fases.map(f=>`
        <div class="phase">
          <div class="phase-dot" style="background:${f.color}">${f.n}</div>
          <div class="phase-bd">
            <div class="phase-ttl">${f.label}</div>
            <div class="phase-tx">${f.desc}</div>
            <div class="phase-dur">${f.dur}</div>

    <div class="cards">
      <div class="card"><div class="card-ico">📹</div><div class="card-ttl">Cápsulas de contenido</div><div class="card-tx">Videos o textos breves para cada unidad temática</div></div>
      <div class="card"><div class="card-ico">📋</div><div class="card-ttl">Casos simulados</div><div class="card-tx">Situaciones laborales realistas para análisis y resolución</div></div>

      <div class="ev-it"><div class="ev-n">2</div><div class="ev-bd"><div class="ev-ttl">Resolución de caso laboral</div><div class="ev-tx">Identificación del problema · Análisis · Alternativas · Decisión fundamentada</div></div></div>
      <div class="ev-it"><div class="ev-n">3</div><div class="ev-bd"><div class="ev-ttl">Evidencia de comunicación profesional</div><div class="ev-tx">Video, respuesta a entrevista simulada o comunicación escrita formal</div></div></div>
      <div class="ev-it"><div class="ev-n">4</div><div class="ev-bd"><div class="ev-ttl">Evidencia de autogestión</div><div class="ev-tx">Plan de trabajo y organización de tareas dentro del caso</div></div></div>
      <div class="ev-it"><div class="ev-n">5</div><div class="ev-bd"><div class="ev-ttl">Reflexión profesional final</div><div class="ev-tx">Aprendizajes logrados · Competencias desarrolladas · Áreas de mejora</div></div></div>

        <div class="rub-it ${r.color}">
          <div class="rub-lbl">${r.nivel}</div>
          <div class="rub-tx">${r.tx}</div>

  </div>`;
}

/* ── CASO ── */
function renderCaso(wrap,b){
  const c = b.caso;
  wrap.innerHTML=`
  <div class="co dk" style="margin-bottom:20px">
    <span class="co-ico">💼</span>
    <div class="co-bd">
      <strong>Actividad integradora · ${b.esIntegrador?'Módulo Integrador':'Módulo '+(b.id+1)}</strong>
      Esta actividad aplica los conceptos del módulo en una simulación de contexto laboral real. Responde con base en tu análisis y criterio profesional.
    </div>
  </div>
  <div class="case-wrap">
    <div class="case-hd">
      <div>
        <div class="case-ttl">📋 ${c.ttl}</div>
        <div class="case-sub">${b.title}</div>
        <div class="case-dur">60 min · Simulación laboral</div>
      </div>
    </div>
    <div class="case-body">
      <div class="case-desc">${c.desc}</div>

      <div class="co r" style="margin-bottom:18px">
        <span class="co-ico">📋</span>
        <div class="co-bd"><strong>Retroalimentación que recibió</strong><ul>${c.feedback.map(f=>`<li>${f}</li>`).join('')}</ul></div>
      </div>` : ''}
      <h3 style="font-size:11px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px;display:flex;align-items:center;gap:9px">Preguntas de análisis <span style="flex:1;height:1px;background:var(--blue-lt)"></span></h3>
      <div class="cards" style="margin-bottom:20px">
        ${c.desafios.map((d,i)=>`<div class="card"><div class="card-ico">${['🎯','⚡','💡','✅'][i%4]}</div><div class="card-tx">${d}</div></div>`).join('')}
      </div>
      <h3 style="font-size:11px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.09em;margin-bottom:12px;display:flex;align-items:center;gap:9px">Espacio de trabajo <span style="flex:1;height:1px;background:var(--gold-lt)"></span></h3>
      ${c.ws.map((f,i)=>`
        <div class="ws-area">
          <div class="ws-lbl">${i+1}. ${f.lbl}${f.hint?`<span style="font-size:10px;color:var(--gray);font-weight:300;text-transform:none;letter-spacing:0;margin-left:8px">→ ${f.hint}</span>`:''}</div>
          <textarea class="ws-ta" placeholder="Escribe tu respuesta aquí..."></textarea>

    </div>

/* ── QUIZ ── */
function renderQuiz(wrap,b){
  const qs=QS[cur]; const q=b.quiz[qs.q]; const total=b.quiz.length;
  wrap.innerHTML=`
  <div class="quiz">
    <div class="quiz-hd">
      <div class="quiz-hd-ico">📝</div>
      <div class="quiz-hd-tx">
        <div class="quiz-hd-ttl">Evaluación · ${b.title}</div>
        <div class="quiz-hd-sub" id="qsub">Pregunta ${qs.q+1} de ${total} · Aciertos: ${qs.score}/${total}</div>
      </div>
    </div>
    <div class="quiz-prog"><div class="quiz-pf" id="qpf" style="width:${Math.round(qs.q/total*100)}%"></div></div>
    <div class="quiz-body">
      <div class="q-cnt">Pregunta ${qs.q+1} / ${total}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-opts">
        ${q.opts.map((o,i)=>`<button class="q-opt" data-idx="${i}" onclick="selOpt(this,${i})">
          <div class="q-let">${String.fromCharCode(65+i)}</div>
          <div class="q-opt-tx">${o}</div>
        </button>`).join('')}
      </div>
      <div class="q-fb" id="qfb"></div>
    </div>
    <div class="quiz-ft">
      <div class="q-sc" id="qsc">Aciertos: ${qs.score} / ${total}</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-gold" id="qchk" onclick="checkQ(${cur})" disabled>Verificar</button>
        <button class="btn btn-b" id="qnxt" onclick="nextQ(${cur})" style="display:none">Siguiente →</button>
      </div>
    </div>
  </div>`;
}

function selOpt(btn,idx){
  if(document.getElementById('qnxt')?.style.display!=='none') return;
  document.querySelectorAll('.q-opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  window._sel=idx;
  const chk=document.getElementById('qchk'); if(chk) chk.disabled=false;
}

function checkQ(lid){
  const qs=QS[lid]; const b=BLOQUES[lid]; const q=b.quiz[qs.q]; const sel=window._sel;
  if(sel===undefined) return;
  document.querySelectorAll('.q-opt').forEach((btn,i)=>{
    if(i===q.ans) btn.classList.add('ok');
    else if(i===sel&&i!==q.ans) btn.classList.add('bad');
    btn.onclick=null;
  });
  const fb=document.getElementById('qfb');
  if(sel===q.ans){qs.score++;fb.className='q-fb show ok-fb';fb.innerHTML='✅ <strong>¡Correcto!</strong> '+q.fb;}
  else{fb.className='q-fb show bad-fb';fb.innerHTML='❌ <strong>Incorrecto.</strong> '+q.fb;}
  document.getElementById('qchk').style.display='none';
  const nxt=document.getElementById('qnxt'); nxt.style.display='inline-flex';
  document.getElementById('qsub').textContent=`Pregunta ${qs.q+1} de ${b.quiz.length} · Aciertos: ${qs.score}/${b.quiz.length}`;
  document.getElementById('qsc').textContent=`Aciertos: ${qs.score} / ${b.quiz.length}`;
  if(qs.q===b.quiz.length-1){nxt.textContent=`Ver resultado (${qs.score}/${b.quiz.length})`;nxt.onclick=()=>showResult(lid);}
  window._sel=undefined;
}

function nextQ(lid){QS[lid].q++;setTab(2,null);}

function showResult(lid){
  const qs=QS[lid]; const b=BLOQUES[lid];
  const pct=Math.round(qs.score/b.quiz.length*100);
  document.querySelector('.quiz').innerHTML=`<div style="padding:36px;text-align:center">
    <div style="font-size:52px;margin-bottom:14px">${pct>=80?'🏆':pct>=60?'👍':'📚'}</div>
    <div style="font-family:var(--fd);font-size:24px;color:var(--ink);margin-bottom:8px">${pct>=80?'¡Excelente dominio!':pct>=60?'Buen trabajo':'Repasa y vuelve a intentarlo'}</div>
    <div style="font-size:14px;color:var(--gray);margin-bottom:22px;font-weight:300">Obtuviste <strong style="font-size:24px;color:var(--blue)">${qs.score}</strong> de <strong>${b.quiz.length}</strong> respuestas correctas (${pct}%)</div>
    ${pct>=60?`<div style="margin-bottom:22px"><button class="btn btn-gold" onclick="markDone(${lid})">✅ Marcar módulo como completado</button></div>`:''}
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-out" onclick="resetQ(${lid})">🔄 Repetir evaluación</button>
      <button class="btn btn-b" onclick="setTab(3,null)">Ver checklist →</button>
    </div>
  </div>`;
}

function markDone(lid){
  done.add(lid);
  buildSb();
  showResult(lid);
}

function resetQ(lid){QS[lid]={q:0,score:0};window._sel=undefined;setTab(2,null);}

/* ── CHECKLIST ── */
function renderChecklist(wrap,b){
  wrap.innerHTML=`
  <div style="background:var(--ink);border-radius:var(--r2);padding:18px 24px;margin-bottom:18px;border:1px solid rgba(255,255,255,.06)">
    <div style="font-family:var(--fd);font-size:18px;color:var(--white);margin-bottom:4px">✅ Lista de verificación</div>
    <div style="font-size:13px;color:rgba(255,255,255,.4);font-weight:300">Confirma que dominas estos conceptos antes de avanzar.</div>
  </div>
  <div class="cl">
    <div class="cl-hd">${b.title}</div>
    ${b.checks.map(c=>`<div class="cl-it" onclick="toggleCheck(this)"><div class="cl-bx"></div><div class="cl-tx">${c}</div></div>`).join('')}
  </div>
  <div class="co b" style="margin-top:14px">
    <span class="co-ico">💡</span>
    <div class="co-bd">Si no puedes marcar todos los elementos con confianza, regresa a la pestaña de Teoría antes de avanzar. El dominio de estos conceptos es prerequisito para los módulos siguientes.</div>
  </div>`;
}

function toggleCheck(el){
  el.classList.toggle('chk');
  el.querySelector('.cl-bx').textContent = el.classList.contains('chk') ? '✓' : '';
}

/* ── SIDEBAR TOGGLE ── */
function toggleSb(){document.getElementById('sb').classList.toggle('shut');}

/* ── INIT ── */
buildSb();
render();
</script>
