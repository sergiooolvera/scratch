name: smart_odds
description: "A new premium real-time live value betting alert app."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^17.1.0
  google_fonts: ^8.0.1
  intl: ^0.20.2
  uuid: ^4.5.2
  flutter_svg: ^2.2.3
  dio: ^5.9.1
  flutter_local_notifications: ^20.1.0
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_messaging: any
  google_sign_in: ^6.2.1
  in_app_purchase: ^3.1.11
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/google_logo.png
